name: Add Version Number
on: push
  branches:
    - "develop"

env:
  TZ: "Asia/Tokyo"
  FILE_NAME: "./src/config.py"
  FILE_HEADER: "# DO NOT EDIT THIS FILE\n# This file is automatically generated\n"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Create File
      run: |
        cat <<EOF > "$FILE_NAME"
        $(FILE_HEADER)
        # $(GITHUB_REPOSITORY_OWNER)/$(GITHUB_REPOSITORY)
        # $(GITHUB_RUN_ID)
        # $(date +'%Y-%m-%d %H:%M:%S')
        VER_SHA = '$GITHUB_SHA'
        EOF

    - name: Commit Push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -f "$FILE_NAME"
        git commit -m "CI: Add ver num"
        git push

